<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadHER Women's Summit — Attendee List</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #1a1a1a;
  --cream: #F0EEE5;
  --purple: #5B4EEF;
  --pink: #FFADAD;
  --white: #ffffff;
  --mid-gray: #6b6b6b;
  --light-line: #E0DDD4;
}

body {
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--black);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 48px 64px;
}

.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--black);
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  font-weight: 700;
  color: var(--black);
  line-height: 1.1;
}
.section-title span { color: var(--purple); }
.attendee-count { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.count-number { font-size: 40px; font-weight: 600; color: var(--purple); line-height: 1; }
.count-label { font-size: 11px; font-weight: 400; color: var(--mid-gray); letter-spacing: 2px; text-transform: uppercase; }

.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
  align-items: center;
  flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 380px; }
.search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--mid-gray); pointer-events: none; }
.search-input {
  width: 100%;
  padding: 10px 14px 10px 40px;
  border: 1.5px solid var(--light-line);
  border-radius: 8px;
  background: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--black);
  outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--purple); }
.search-input::placeholder { color: #aaa; }
.filter-select {
  padding: 10px 16px;
  border: 1.5px solid var(--light-line);
  border-radius: 8px;
  background: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--black);
  cursor: pointer;
  outline: none;
  min-width: 180px;
  transition: border-color .2s;
}
.filter-select:focus { border-color: var(--purple); }
.results-info { font-size: 13px; color: var(--mid-gray); margin-left: auto; white-space: nowrap; }
.results-info strong { color: var(--purple); }

.table-wrap {
  background: var(--white);
  border-radius: 12px;
  border: 1px solid var(--light-line);
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}

table { width: 100%; border-collapse: collapse; }

thead th {
  background: var(--black);
  color: var(--white);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 14px 20px;
  text-align: left;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
thead th:hover { background: #2e2e2e; }
thead th .sort-arrow { display: inline-block; margin-left: 6px; opacity: 0.4; font-size: 10px; }
thead th.sorted .sort-arrow { opacity: 1; color: var(--pink); }

tbody tr { border-bottom: 1px solid #F0EDE5; transition: background .12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #faf9f5; }
tbody tr:nth-child(even) { background: #FAFAF7; }
tbody tr:nth-child(even):hover { background: #f5f4ef; }

td { padding: 14px 20px; font-size: 14px; vertical-align: middle; }

.td-name { min-width: 170px; }
.name-full { font-weight: 500; color: var(--black); line-height: 1.2; }
.name-initials {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 34px;
  border-radius: 50%;
  font-size: 12px; font-weight: 600;
  color: var(--white);
  margin-right: 10px;
  flex-shrink: 0;
}
.name-cell { display: flex; align-items: center; }
.td-company { font-weight: 400; color: var(--black); min-width: 200px; font-size: 13px; }
.td-title { color: var(--mid-gray); font-size: 12.5px; min-width: 180px; line-height: 1.35; }
.td-email { font-size: 12px; color: var(--purple); white-space: nowrap; }
.td-email a { color: var(--purple); text-decoration: none; }
.td-email a:hover { text-decoration: underline; }

.no-results { text-align: center; padding: 60px 20px; color: var(--mid-gray); font-size: 15px; }
.no-results span { display: block; font-size: 32px; margin-bottom: 12px; opacity: .4; }

.footer {
  background: var(--black);
  padding: 20px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.footer-left { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; }
.footer-right { font-size: 11px; color: rgba(255,255,255,0.35); }

/* ── MOBILE ── */
@media (max-width: 640px) {
  .main { padding: 20px 16px 40px; }
  .section-header { margin-bottom: 20px; padding-bottom: 16px; }
  .section-title { font-size: 26px; }
  .count-number { font-size: 28px; }
  .count-label { font-size: 9px; letter-spacing: 1px; }
  .controls { flex-direction: column; align-items: stretch; gap: 10px; margin-bottom: 16px; }
  .search-wrap { max-width: 100%; min-width: 0; }
  .search-input { font-size: 16px; }
  .filter-select { width: 100%; min-width: 0; font-size: 16px; }
  .results-info { margin-left: 0; text-align: center; }
  .footer { padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 4px; }
  .table-wrap { border-radius: 10px; }
  thead { display: none; }
  table, tbody, tr, td { display: block; width: 100%; }
  tbody tr { padding: 14px 16px; border-bottom: 1px solid #EDEAE0; }
  tbody tr:nth-child(even) { background: #FAFAF7; }
  td.td-name { padding: 0 0 6px 0; min-width: unset; }
  .name-initials { width: 30px; height: 30px; font-size: 11px; margin-right: 8px; }
  .name-full { font-size: 15px; }
  td.td-company { padding: 0 0 3px 38px; font-size: 13px; font-weight: 500; min-width: unset; }
  td.td-title { padding: 0 0 6px 38px; font-size: 12px; min-width: unset; }
  td.td-email { padding: 0 0 0 38px; font-size: 12px; white-space: normal; word-break: break-all; }
}

@media print {
  .controls { display: none; }
  body { background: white; }
  .table-wrap { box-shadow: none; border: 1px solid #ddd; }
}
</style>
</head>

const AVATAR_COLORS = ['#5B4EEF','#1a1a1a','#7B6FF0','#3D348B','#8E44AD','#2C3E50','#6C5CE7','#4A235A','#9B59B6','#2E4057'];
function getColor(name) { let h=0; for (let c of name) h=c.charCodeAt(0)+((h<<5)-h); return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]; }
function initials(f,l) { return ((f[0]||'')+(l[0]||'')).toUpperCase(); }

const companies = [...new Set(ATTENDEES.map(a=>a.company).filter(Boolean))].sort();
const sel = document.getElementById('companyFilter');
companies.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });

let currentSort = { col:'name', dir:1 };
let filtered = [...ATTENDEES];

function renderTable(data) {
  const tbody = document.getElementById('attendeeBody');
  tbody.innerHTML = '';
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="no-results"><span>🔍</span>No attendees match your search.</td></tr>';
    return;
  }
  data.forEach(a => {
    const tr = document.createElement('tr');
    const color = getColor(a.first+a.last);
    tr.innerHTML = `
      <td class="td-name"><div class="name-cell">
        <span class="name-initials" style="background:${color}">${initials(a.first,a.last)}</span>
        <span class="name-full">${a.first} ${a.last}</span>
      </div></td>
      <td class="td-company">${a.company||'—'}</td>
      <td class="td-title">${a.title||'—'}</td>
      <td class="td-email"><a href="mailto:${a.email}">${a.email||'—'}</a></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('resultsInfo').innerHTML = `Showing <strong>${data.length}</strong> of ${ATTENDEES.length}`;
  document.getElementById('totalCount').textContent = data.length===ATTENDEES.length ? ATTENDEES.length : data.length;
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const co = document.getElementById('companyFilter').value;
  filtered = ATTENDEES.filter(a => {
    const full = `${a.first} ${a.last} ${a.company} ${a.title} ${a.email}`.toLowerCase();
    return (!q||full.includes(q)) && (!co||a.company===co);
  });
  sortAndRender();
}

function sortTable(col) {
  if (currentSort.col===col) currentSort.dir*=-1;
  else { currentSort.col=col; currentSort.dir=1; }
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted'));
  document.getElementById(`th-${col}`).classList.add('sorted');
  document.querySelector(`#th-${col} .sort-arrow`).textContent = currentSort.dir===1?'↑':'↓';
  sortAndRender();
}

function sortAndRender() {
  const {col,dir} = currentSort;
  filtered.sort((a,b) => {
    let va = col==='name'?`${a.last} ${a.first}`:a[col]||'';
    let vb = col==='name'?`${b.last} ${b.first}`:b[col]||'';
    return va.localeCompare(vb)*dir;
  });
  renderTable(filtered);
}

renderTable(ATTENDEES);
